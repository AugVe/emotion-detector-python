name: CI Emotion Detector Pipeline

# This workflow triggers on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-logic:
    # Use the latest Ubuntu runner provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the repository to the runner's workspace
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step 2: Initialize the Python environment (matching Docker's version)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install all project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run automated unit tests using GitHub Secrets
      - name: Run all tests with Pytest
        env:
          WATSON_URL: ${{ secrets.WATSON_URL }}
          WATSON_API_KEY: ${{ secrets.WATSON_API_KEY }}
        run: |
          pytest